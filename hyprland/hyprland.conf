### VARIABLES
# Monitors
$MON_0 = DP-2
$MON_1 = DP-1
# Programs
$terminal = ghostty
$fileManager = XDG_CURRENT_DESKTOP=kde dolphin

$mainMod = SUPER

### FIXES
source = fixes.conf

### MONITORS
source = ~/.config/hypr/monitors.conf

### AUTOSTART 
source = ~/.config/hypr/autostart.conf

### ENVIRONMENT VARIABLES
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

### LOOK AND FEEL
source = ~/.config/hypr/look.conf

### INPUT DEVICES
source = ~/.config/hypr/input.conf

### KEYBINDINGS
source = ~/.config/hypr/keybinds.conf

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
	# Ignore maximize requests from all apps. You'll probably like this.
	name = suppress-maximize-events
	match:class = .*

	suppress_event = maximize
}

windowrule {
	# Fix some dragging issues with XWayland
	name = fix-xwayland-drags
	match:class = ^$
	match:title = ^$
	match:xwayland = true
	match:float = true
	match:fullscreen = false
	match:pin = false

	no_focus = true
}


workspace = 1, monitor:DP-2, gapsin:0, gapsout:0, border:0
workspace = 2, monitor:DP-2, gapsin:0, gapsout:0, border:0
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-2
workspace = 5, monitor:DP-1, gapsin:0, gapsout:0, border:0
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = special:magic, gapsin:0, gapsout:0, border:0
workspace = special:scratchpad, layout:scrolling, layoutopt:direction:down, gapsin:5, gapsout:5, border:0

# scratchpad
windowrule {
	name = scratchpad-alpha
	match:workspace = special:scratchpad
	opacity = 0.9
}

# ghostty
windowrule {
	name = rmpc-alpha
	match:title = rmpc
	opacity = 0.9 0.6
}

# steam
windowrule {
	name = steam-on-ws4
	match:title = Steam
	workspace = 4 silent
}

# dev workspace
windowrule {
	name = nvim-on-ws2
	match:title = nvim-hyprland-ws2
	workspace = 2 silent
}
windowrule {
	name = vimages-monitor
	match:title = vimages
	workspace = 6 silent
}

# blender modals
windowrule {
	name = blender-file-dialog
	match:class = blender
	match:float = 1
	size = 2000 1400
	move = ((monitor_w-window_x)/2) ((monitor_h-window_y)/2)
}
